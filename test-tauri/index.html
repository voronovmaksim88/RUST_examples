<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Счётчик</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main class="app">
      <p class="value" id="counter-value" aria-live="polite">0</p>
      <div class="controls">
        <button type="button" id="btn-minus" aria-label="Уменьшить на 1">−1</button>
        <button type="button" id="btn-plus" aria-label="Увеличить на 1">+1</button>
      </div>
    </main>
  </body>
</html>
